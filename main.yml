---
- name: Install Homebrew packages on macOS
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - config.yml
  tasks:
    # Brew packages (speedtest canviat, pingmenu eliminat)
    - name: Tap teamookla/speedtest
      homebrew_tap:
        name: teamookla/speedtest
        state: present
      tags: packages, networking

    - name: Install packages - Development
      homebrew:
        name: "{{ packagesdevelopment }}"
        state: present
      tags: packages, development

    - name: Install packages - Cloud DevOps
      homebrew:
        name: "{{ packagesclouddevops }}"
        state: present
      tags: packages, clouddevops

    - name: Install packages - Networking
      homebrew:
        name: "{{ packagesnetworking }}"
        state: present
      tags: packages, networking

    - name: Install packages - System Utilities
      homebrew:
        name: "{{ packagessystemutilities }}"
        state: present
      tags: packages, systemutilities

    # ELIMINAT: packagesterminalshell (ara al role)

    # Casks (sense pingmenu)
    - name: Install casks - Browsers
      homebrew_cask:
        name: "{{ casksbrowsers }}"
        state: present
      tags: casks, browsers

    - name: Install casks - Development
      homebrew_cask:
        name: "{{ casksdevelopment }}"
        state: present
      tags: casks, development

    - name: Install casks - Terminal
      homebrew_cask:
        name: "{{ casksterminal }}"
        state: present
      tags: casks, terminal

    - name: Install casks - Communication
      homebrew_cask:
        name: "{{ caskscommunication }}"
        state: present
      tags: casks, communication

    - name: Install casks - Productivity
      homebrew_cask:
        name: "{{ casksproductivity }}"
        state: present
      tags: casks, productivity

    - name: Install casks - Networking & VPN
      homebrew_cask:
        name: "{{ casksnetworkingvpn }}"
        state: present
      tags: casks, networking

    - name: Install casks - Remote Access
      homebrew_cask:
        name: "{{ casksremoteaccess }}"
        state: present
      tags: casks, remoteaccess

    - name: Install casks - File Management & Cloud
      homebrew_cask:
        name: "{{ casksfilemanagementcloud }}"
        state: present
      tags: casks, filemanagement

    - name: Install casks - System Utilities
      homebrew_cask:
        name: "{{ caskssystemutilities }}"
        state: present
      tags: casks, systemutilities

    - name: Install casks - Microsoft Suite
      homebrew_cask:
        name: "{{ casksmicrosoftsuite }}"
        state: present
      tags: casks, microsoft

    - name: Install casks - Media
      homebrew_cask:
        name: "{{ casksmedia }}"
        state: present
      tags: casks, media

    - name: Install casks - Documents
      homebrew_cask:
        name: "{{ casksdocuments }}"
        state: present
      tags: casks, documents

    - name: Install casks - Hardware
      homebrew_cask:
        name: "{{ caskshardware }}"
        state: present
      tags: casks, hardware

    # # NOVO: App Store via MAS
    # - name: Install App Store apps
    #   community.general.mas:
    #     id: "{{ item.key | int }}"
    #     state: present
    #   loop: "{{ mas_apps | dict2items }}"
    #   loop_control:
    #     label: "{{ item.key }} - {{ item.value }}"
    #   tags: appstore



    # NOVO: Startup apps
    - name: Add startup apps
      shell: |
        app="{{ item }}"
        existing=$(osascript -e 'tell application "System Events" to get the name of every login item')
        if echo "$existing" | grep -qw "$app"; then
          echo "SKIP: $app already a login item"
        else
          osascript -e "tell application \"System Events\" to make login item at end with properties {name:\"${app}\", path:\"/Applications/${app}.app\", hidden:false}"
          echo "ADDED: $app"
        fi
      loop: "{{ startup_apps }}"
      register: login_item_result
      changed_when: "'ADDED' in login_item_result.stdout"
      tags: startup

# NOU ROLE: Shell
- name: Setup awesome shell (Starship + Zsh)
  hosts: localhost
  connection: local
  gather_facts: yes
  roles:
    - shell

# NOU ROLE: macOS Desktop + Mission Control
- name: Configure macOS Desktop & Hot Corners
  hosts: localhost
  connection: local
  gather_facts: false
  roles:
    - desktop

# NOU ROLE: Karabiner complex modifications
- name: Deploy Karabiner-Elements complex modifications
  hosts: localhost
  connection: local
  gather_facts: true
  roles:
    - karabiner
