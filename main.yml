---
- name: Install Homebrew packages on macOS
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - config.yml
  tasks:
    # Brew packages (speedtest canviat, pingmenu eliminat)
    - name: Install packages - Development
      homebrew:
        name: "{{ packagesdevelopment }}"
        state: present
      tags: packages, development

    - name: Install packages - Cloud DevOps
      homebrew:
        name: "{{ packagesclouddevops }}"
        state: present
      tags: packages, clouddevops

    - name: Install packages - Networking
      homebrew:
        name: "{{ packagesnetworking }}"
        state: present
      tags: packages, networking

    - name: Install packages - System Utilities
      homebrew:
        name: "{{ packagessystemutilities }}"
        state: present
      tags: packages, systemutilities

    # ELIMINAT: packagesterminalshell (ara al role)

    # Casks (sense pingmenu)
    - name: Install casks - Browsers
      homebrew_cask:
        name: "{{ casksbrowsers }}"
        state: present
      tags: casks, browsers

    - name: Install casks - Development
      homebrew_cask:
        name: "{{ casksdevelopment }}"
        state: present
      tags: casks, development

    # ... resta de casks igual que tenies ...

    # # NOVO: App Store via MAS
    # - name: Install App Store apps
    #   community.general.mas:
    #     id: "{{ item.key | int }}"
    #     state: present
    #   loop: "{{ mas_apps | dict2items }}"
    #   loop_control:
    #     label: "{{ item.key }} - {{ item.value }}"
    #   tags: appstore



    # NOVO: Startup apps
    - name: Add startup apps
      shell: |
        app="{{ item }}"
        existing=$(osascript -e 'tell application "System Events" to get the name of every login item')
        if echo "$existing" | grep -qw "$app"; then
          echo "SKIP: $app already a login item"
        else
          osascript -e "tell application \"System Events\" to make login item at end with properties {name:\"${app}\", path:\"/Applications/${app}.app\", hidden:false}"
          echo "ADDED: $app"
        fi
      loop: "{{ startup_apps }}"
      register: login_item_result
      changed_when: "'ADDED' in login_item_result.stdout"
      tags: startup

# NOU ROLE: Shell
- name: Setup awesome shell (Starship + Zsh)
  hosts: localhost
  connection: local
  gather_facts: yes
  roles:
    - shell

# NOU ROLE: macOS Desktop + Mission Control
- name: Configure macOS Desktop & Hot Corners
  hosts: localhost
  connection: local
  gather_facts: false
  roles:
    - desktop
