---
# Desktop: amaga icones del Finder
- name: Disable desktop icons
  community.general.osx_defaults:
    domain: com.apple.finder
    key: CreateDesktop
    type: string
    value: "false"
  tags: desktop

- name: Reload Finder
  shell: killall Finder || true
  changed_when: false
  tags: desktop

# Hot corners: Mission Control cantonades superiors
- name: Set top-right hot corner to Mission Control
  community.general.osx_defaults:
    domain: com.apple.dock
    key: wvous-tr-corner
    type: int
    value: 2          # 2 = Mission Control
  tags: hotcorners

- name: Set top-right hot corner modifier to none
  community.general.osx_defaults:
    domain: com.apple.dock
    key: wvous-tr-modifier
    type: int
    value: 0          # 0 = sense modificador
  tags: hotcorners

- name: Set top-left hot corner to Mission Control
  community.general.osx_defaults:
    domain: com.apple.dock
    key: wvous-tl-corner
    type: int
    value: 2
  tags: hotcorners

- name: Set top-left hot corner modifier to none
  community.general.osx_defaults:
    domain: com.apple.dock
    key: wvous-tl-modifier
    type: int
    value: 0
  tags: hotcorners

- name: Set Dock position to the right
  community.general.osx_defaults:
    domain: com.apple.dock
    key: orientation
    type: string
    value: right
  tags: dock

- name: Set Dock tile size
  community.general.osx_defaults:
    domain: com.apple.dock
    key: tilesize
    type: float
    value: 56
  tags: dock

- name: Enable Dock magnification
  community.general.osx_defaults:
    domain: com.apple.dock
    key: magnification
    type: bool
    value: true
  tags: dock

- name: Set Dock magnified tile size
  community.general.osx_defaults:
    domain: com.apple.dock
    key: largesize
    type: float
    value: 74
  tags: dock

- name: Reload Dock
  shell: killall Dock || true
  changed_when: false
  tags: hotcorners,dock

- name: Disable natural scrolling (trackpad/mouse)
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: com.apple.swipescrolldirection
    type: bool
    value: false
  tags: input,trackpad

- name: Trackpad - Quiet click
  community.general.osx_defaults:
    domain: com.apple.AppleMultitouchTrackpad
    key: ActuateDetents
    type: int
    value: 0
  tags: input,trackpad

- name: Trackpad - Enable Force Click and haptic feedback
  community.general.osx_defaults:
    domain: com.apple.AppleMultitouchTrackpad
    key: ForceSuppressed
    type: bool
    value: false
  tags: input,trackpad

- name: Trackpad - Tap to click
  community.general.osx_defaults:
    domain: com.apple.AppleMultitouchTrackpad
    key: Clicking
    type: int
    value: 1
  tags: input,trackpad

- name: Trackpad - Secondary click with two fingers
  community.general.osx_defaults:
    domain: com.apple.AppleMultitouchTrackpad
    key: TrackpadRightClick
    type: bool
    value: true
  tags: input,trackpad

- name: Trackpad - Secondary click mode (two fingers, not corner)
  community.general.osx_defaults:
    domain: com.apple.AppleMultitouchTrackpad
    key: TrackpadCornerSecondaryClick
    type: int
    value: 0
  tags: input,trackpad

- name: Trackpad - Enable dragging without drag lock (Accessibility)
  community.general.osx_defaults:
    domain: com.apple.AppleMultitouchTrackpad
    key: Dragging
    type: int
    value: 1
  tags: input,trackpad

- name: Trackpad - Dragging style without drag lock
  community.general.osx_defaults:
    domain: com.apple.AppleMultitouchTrackpad
    key: DragLock
    type: int
    value: 0
  tags: input,trackpad

# NOTA: Accessibility - Zoom amb Ctrl+scroll wheel no configurable per Ansible.
# macOS protegeix el domini com.apple.universalaccess (TCC) i bloqueja `defaults write`
# per a qualsevol procés, encara amb permisos d'Accessibility concedits.
# Cal activar-ho manualment a Configuració del Sistema > Accessibilitat > Zoom >
# "Use scroll gesture with modifier keys to zoom" (modificador: Control).

- name: Use F1, F2, etc. as standard function keys
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: com.apple.keyboard.fnState
    type: bool
    value: true       # F1..F12 com a tecles de funció
  tags: keyboard,fnkeys

- name: Disable double-space period substitution
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: NSAutomaticPeriodSubstitutionEnabled
    type: bool
    value: false
  tags: keyboard

- name: Play feedback when volume is changed
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: com.apple.sound.beep.feedback
    type: int
    value: 1
  tags: sound
