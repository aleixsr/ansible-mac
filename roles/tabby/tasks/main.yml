---
- name: Ensure Tabby plugins directory exists
  file:
    path: "{{ ansible_facts['env']['HOME'] }}/Library/Application Support/tabby/plugins"
    state: directory
    mode: "0755"
  tags: tabby

- name: Deploy Tabby plugins package.json
  copy:
    src: "{{ playbook_dir }}/files/tabby/package.json"
    dest: "{{ ansible_facts['env']['HOME'] }}/Library/Application Support/tabby/plugins/package.json"
    mode: "0644"
  register: tabby_plugins_package_json
  tags: tabby

- name: Install Tabby plugins (npm install syncs node_modules to package.json, pruning removed ones)
  command: npm install --legacy-peer-deps
  args:
    chdir: "{{ ansible_facts['env']['HOME'] }}/Library/Application Support/tabby/plugins"
  when: tabby_plugins_package_json.changed
  tags: tabby
